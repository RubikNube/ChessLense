<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess</title>
    <script>
      (function preloadTheme() {
        const storageKey = "chesslense.frontend-state";
        const allowedKeys = [
          "appBackground",
          "appText",
          "surface",
          "surfaceAlt",
          "surfaceText",
          "surfaceTextMuted",
          "border",
          "accent",
          "accentText",
          "success",
          "successText",
          "danger",
          "dangerText",
          "modalBackground",
          "modalSurface",
          "modalText",
          "modalTextMuted",
          "modalBorder",
          "boardLightSquare",
          "boardDarkSquare",
          "boardWhitePiece",
          "boardBlackPiece",
        ];
        const hexPattern = /^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/;

        function normalizeHexColor(value) {
          if (typeof value !== "string") {
            return null;
          }

          const normalizedValue = value.trim().toLowerCase();

          if (!hexPattern.test(normalizedValue)) {
            return null;
          }

          if (normalizedValue.length === 4) {
            return `#${normalizedValue
              .slice(1)
              .split("")
              .map((character) => character.repeat(2))
              .join("")}`;
          }

          return normalizedValue;
        }

        function toCssVariableName(tokenName) {
          return `--theme-${tokenName.replace(/[A-Z]/g, (character) => `-${character.toLowerCase()}`)}`;
        }

        function hexToRgba(hexColor, alpha) {
          const normalizedColor = normalizeHexColor(hexColor);

          if (!normalizedColor) {
            return null;
          }

          const red = Number.parseInt(normalizedColor.slice(1, 3), 16);
          const green = Number.parseInt(normalizedColor.slice(3, 5), 16);
          const blue = Number.parseInt(normalizedColor.slice(5, 7), 16);

          return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
        }

        try {
          const rawState = window.localStorage.getItem(storageKey);

          if (!rawState) {
            return;
          }

          const parsedState = JSON.parse(rawState);
          const themeOverrides =
            parsedState && typeof parsedState === "object"
              ? parsedState.themeOverrides
              : null;

          if (!themeOverrides || typeof themeOverrides !== "object") {
            return;
          }

          const rootStyle = document.documentElement.style;

          for (const tokenName of allowedKeys) {
            const normalizedColor = normalizeHexColor(
              themeOverrides[tokenName],
            );

            if (!normalizedColor) {
              continue;
            }

            rootStyle.setProperty(
              toCssVariableName(tokenName),
              normalizedColor,
            );
          }

          const accent = normalizeHexColor(themeOverrides.accent);
          const success = normalizeHexColor(themeOverrides.success);
          const danger = normalizeHexColor(themeOverrides.danger);
          const appBackground = normalizeHexColor(themeOverrides.appBackground);

          if (accent) {
            rootStyle.setProperty(
              "--theme-accent-soft",
              hexToRgba(accent, 0.18),
            );
            rootStyle.setProperty(
              "--theme-accent-outline",
              hexToRgba(accent, 0.35),
            );
          }

          if (success) {
            rootStyle.setProperty(
              "--theme-success-soft",
              hexToRgba(success, 0.18),
            );
          }

          if (danger) {
            rootStyle.setProperty(
              "--theme-danger-soft",
              hexToRgba(danger, 0.18),
            );
          }

          if (appBackground) {
            rootStyle.setProperty(
              "--theme-overlay",
              hexToRgba(appBackground, 0.78),
            );
            rootStyle.setProperty(
              "--theme-tooltip-background",
              hexToRgba(appBackground, 0.98),
            );
            rootStyle.setProperty(
              "--theme-shadow",
              hexToRgba(appBackground, 0.35),
            );
            rootStyle.setProperty(
              "--theme-shadow-strong",
              hexToRgba(appBackground, 0.5),
            );
          }
        } catch {
          // Ignore invalid saved theme data and fall back to defaults.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
